---
- name: Bootstrap Python on all nodes
  hosts: all
  gather_facts: false
  become: true
  roles:
    - bootstrap-python

- name: Common prerequisites on all nodes
  hosts: all
  become: true
  roles:
    - common
    - node-exporter
    - yb-build

- name: Deploy YB masters
  hosts: masters
  become: true
  roles:
    - yb-master

- name: Deploy YB tservers
  hosts: tservers
  become: true
  roles:
    - yb-tserver
