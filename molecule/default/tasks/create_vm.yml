---
- name: "Check if {{ vm_prefix }}-{{ platform.name }} exists"
  ansible.builtin.command:
    cmd: "virsh domstate {{ vm_prefix }}-{{ platform.name }}"
  register: _vm_state
  changed_when: false
  failed_when: false

- name: "Check for clean-base snapshot on {{ vm_prefix }}-{{ platform.name }}"
  ansible.builtin.command:
    cmd: "virsh snapshot-list {{ vm_prefix }}-{{ platform.name }} --name"
  register: _vm_snapshots
  changed_when: false
  failed_when: false
  when: _vm_state.rc == 0

- name: Set snapshot availability fact
  ansible.builtin.set_fact:
    _has_snapshot: >-
      {{ _vm_state.rc == 0
         and molecule_snapshot_name in (_vm_snapshots.stdout_lines | default([])) }}

- name: "Revert {{ vm_prefix }}-{{ platform.name }} to clean base snapshot"
  when: _has_snapshot | bool
  block:
    - name: Force off VM before revert
      ansible.builtin.command:
        cmd: "virsh destroy {{ vm_prefix }}-{{ platform.name }}"
      failed_when: false
      changed_when: true

    - name: Revert to clean-base snapshot
      ansible.builtin.command:
        cmd: "virsh snapshot-revert {{ vm_prefix }}-{{ platform.name }} {{ molecule_snapshot_name }}"

    - name: Start VM from snapshot
      ansible.builtin.command:
        cmd: "virsh start {{ vm_prefix }}-{{ platform.name }}"

- name: "Clean up stale {{ vm_prefix }}-{{ platform.name }}"
  ansible.builtin.shell:
    cmd: |
      virsh destroy {{ vm_prefix }}-{{ platform.name }} 2>/dev/null || true
      virsh undefine {{ vm_prefix }}-{{ platform.name }} --snapshots-metadata --remove-all-storage 2>/dev/null \
        || virsh undefine {{ vm_prefix }}-{{ platform.name }} --snapshots-metadata 2>/dev/null || true
      rm -f {{ vm_dir }}/{{ vm_prefix }}-{{ platform.name }}.qcow2
      rm -f {{ vm_dir }}/{{ vm_prefix }}-{{ platform.name }}-cidata.iso
    executable: /bin/bash
  when:
    - not (_has_snapshot | bool)
    - _vm_state.rc == 0

- name: "Create {{ vm_prefix }}-{{ platform.name }}"
  when: not (_has_snapshot | bool)
  block:
    - name: Create disk from base image
      ansible.builtin.command:
        cmd: >-
          qemu-img create -f qcow2
          -b {{ base_img }} -F qcow2
          {{ vm_dir }}/{{ vm_prefix }}-{{ platform.name }}.qcow2
          {{ platform.disk_gb | default(10) }}G

    - name: Write cloud-init meta-data
      ansible.builtin.copy:
        content: |
          instance-id: {{ vm_prefix }}-{{ platform.name }}
          local-hostname: {{ vm_prefix }}-{{ platform.name }}
        dest: "{{ vm_dir }}/{{ vm_prefix }}-{{ platform.name }}-meta-data"
        mode: "0644"

    - name: Write cloud-init user-data
      ansible.builtin.copy:
        content: |
          #cloud-config
          hostname: {{ vm_prefix }}-{{ platform.name }}
          manage_etc_hosts: true
          runcmd:
            - dnf install -y python3 openssh-server
            - systemctl enable --now sshd
            - setenforce 0 || true
            - sed -i 's/^SELINUX=enforcing/SELINUX=permissive/g' /etc/selinux/config
            - dd if=/dev/zero of=/swapfile bs=1M count=2048
            - chmod 600 /swapfile
            - mkswap /swapfile
            - swapon /swapfile
            - echo "/swapfile none swap sw 0 0" >> /etc/fstab
          users:
            - name: "{{ molecule_ssh_user }}"
              sudo: ALL=(ALL) NOPASSWD:ALL
              shell: /bin/bash
              ssh_authorized_keys:
                - {{ ssh_pub_key }}
        dest: "{{ vm_dir }}/{{ vm_prefix }}-{{ platform.name }}-user-data"
        mode: "0644"

    - name: Write cloud-init network-config
      ansible.builtin.copy:
        content: |
          version: 2
          ethernets:
            eth0:
              dhcp4: true
        dest: "{{ vm_dir }}/{{ vm_prefix }}-{{ platform.name }}-network-config"
        mode: "0644"

    - name: Create cloud-init ISO
      ansible.builtin.command:
        cmd: >-
          genisoimage -output {{ vm_dir }}/{{ vm_prefix }}-{{ platform.name }}-cidata.iso
          -volid cidata -joliet -rock -graft-points
          user-data={{ vm_dir }}/{{ vm_prefix }}-{{ platform.name }}-user-data
          meta-data={{ vm_dir }}/{{ vm_prefix }}-{{ platform.name }}-meta-data
          network-config={{ vm_dir }}/{{ vm_prefix }}-{{ platform.name }}-network-config

    - name: Create and start VM
      ansible.builtin.command:
        cmd: >-
          virt-install
          --name {{ vm_prefix }}-{{ platform.name }}
          --vcpus {{ platform.vcpus | default(1) }}
          --memory {{ platform.ram_mb | default(1024) }}
          --disk path={{ vm_dir }}/{{ vm_prefix }}-{{ platform.name }}.qcow2,format=qcow2,bus=virtio,cache=none,io=native
          --disk path={{ vm_dir }}/{{ vm_prefix }}-{{ platform.name }}-cidata.iso,device=cdrom
          --os-variant centos-stream8
          --network network=default
          --graphics none
          --noautoconsole
          --import

- name: Track VMs needing snapshot
  ansible.builtin.set_fact:
    _vms_needing_snapshot: >-
      {{ _vms_needing_snapshot | default([])
         + ([] if (_has_snapshot | bool) else [platform.name]) }}
