---
- name: Ensure local cache directory exists
  ansible.builtin.file:
    path: "{{ yb_portable_python_archive | dirname }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false

- name: Download portable Python to controller
  ansible.builtin.get_url:
    url: "{{ yb_portable_python_url }}"
    dest: "{{ yb_portable_python_archive }}"
    checksum: "{{ yb_portable_python_checksum }}"
    mode: "0644"
  delegate_to: localhost
  become: false

- name: Ensure destination directory exists on remote
  ansible.builtin.file:
    path: "{{ yb_portable_python_dest }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Extract portable Python on remote
  ansible.builtin.unarchive:
    src: "{{ yb_portable_python_archive }}"
    dest: "{{ yb_portable_python_dest }}"
    owner: root
    group: root
    remote_src: false

- name: Rename extracted directory to python3
  ansible.builtin.shell: |
    if [ -d "{{ yb_portable_python_dest }}/python" ]; then
      mv "{{ yb_portable_python_dest }}/python" "{{ yb_portable_python_dest }}/python3"
    fi
  args:
    creates: "{{ yb_portable_python_dest }}/python3"
