---
- name: Derive master_addresses from inventory
  ansible.builtin.set_fact:
    yb_master_addresses: >-
      {{ groups['masters']
         | map('extract', hostvars, 'ansible_host')
         | map('regex_replace', '$', ':' ~ yb_master_rpc_port)
         | join(',') }}
  when: yb_master_addresses is not defined

- name: Create master data directory
  ansible.builtin.file:
    path: "{{ yb_master_data_dir }}"
    state: directory
    owner: "{{ yb_user }}"
    group: "{{ yb_group }}"
    mode: "0755"

- name: Check if yb-master unit exists
  ansible.builtin.stat:
    path: "/etc/systemd/system/{{ yb_master_service_name }}.service"
  register: _yb_master_unit

- name: Install yb-master systemd unit
  ansible.builtin.template:
    src: yb-master.service.j2
    dest: "/etc/systemd/system/{{ yb_master_service_name }}.service"
    mode: "0644"
  notify: yb-master config changed

- name: Enable and start yb-master
  ansible.builtin.systemd:
    name: "{{ yb_master_service_name }}"
    state: started
    enabled: true
    daemon_reload: true
