name: Build YB Shipper Image

on:
  workflow_dispatch:
    inputs:
      yb_version:
        description: "YugabyteDB version (e.g. 2025.2.2.2)"
        required: true
        default: "2025.2.3.2"
      yb_build:
        description: "Build number (e.g. b11)"
        required: true
        default: "b1"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/yb-shipper

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: shipper
          push: true
          build-args: |
            YB_VERSION=${{ inputs.yb_version }}
            YB_BUILD=${{ inputs.yb_build }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.yb_version }}-${{ inputs.yb_build }}
