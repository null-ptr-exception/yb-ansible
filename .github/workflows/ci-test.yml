name: CI Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, kata-rophy]
    env:
      LIBVIRT_DEFAULT_URI: qemu:///system

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48
        with:
          python-version: "3.12"

      - name: Install crane
        run: |
          CRANE_VERSION=0.21.5
          CRANE_SHA256=9f823ae5ee25803161110f957b5fd4538f714d40cdf25dacb4914fefafd246bf
          mkdir -p "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          INSTALLED_VERSION=$("$HOME/bin/crane" version 2>/dev/null || echo "none")
          if [ "$INSTALLED_VERSION" != "$CRANE_VERSION" ]; then
            curl -fsSL -o /tmp/crane.tar.gz \
              "https://github.com/google/go-containerregistry/releases/download/v${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz"
            echo "${CRANE_SHA256}  /tmp/crane.tar.gz" | sha256sum -c -
            tar -xzf /tmp/crane.tar.gz -C "$HOME/bin" crane
          fi

      - name: Set up virtualenv
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install 'ansible-core>=2.16,<2.17' molecule

      - name: Read runner SSH public key
        id: ssh-key
        run: |
          echo "pub_key=$(cat ~/.ssh/id_ed25519.pub)" >> "$GITHUB_OUTPUT"
          echo "identity_file=$HOME/.ssh/id_ed25519" >> "$GITHUB_OUTPUT"

      - name: Clean up stale VMs
        run: |
          for vm in $(virsh list --all --name 2>/dev/null | grep '^yb-ansible-'); do
            virsh destroy "$vm" 2>/dev/null || true
            virsh undefine "$vm" --snapshots-metadata --remove-all-storage 2>/dev/null \
              || virsh undefine "$vm" --snapshots-metadata 2>/dev/null || true
          done

      - name: Run molecule test
        run: |
          source .venv/bin/activate
          molecule test
        env:
          MOLECULE_SSH_PUB_KEY: ${{ steps.ssh-key.outputs.pub_key }}
          MOLECULE_SSH_IDENTITY_FILE: ${{ steps.ssh-key.outputs.identity_file }}
          MOLECULE_YB_SHIPPER_REGISTRY: ${{ secrets.MOLECULE_YB_SHIPPER_REGISTRY }}
          MOLECULE_NODE_EXPORTER_REGISTRY: ${{ secrets.MOLECULE_NODE_EXPORTER_REGISTRY }}
          MOLECULE_CRANE_INSECURE: "true"

      - name: Upload Molecule logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: molecule-logs
          path: logs/
