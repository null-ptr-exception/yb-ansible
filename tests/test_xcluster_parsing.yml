---
- name: Test Table ID parsing logic
  hosts: localhost
  gather_facts: false
  vars:
    xcluster_databases:
      - name: test_db
        type: ysql
        tables:
          - table1
          - table2
    yb_tables_raw:
      stdout_lines:
        - "sys.catalog.tables (ycql) 00000000000000000000000000000001"
        - "test_db.table1 [ysql_schema=public] 00004000000030008000000000004001"
        - "test_db.table2 [ysql_schema=public] 00004000000030008000000000004002"
        - "test_db.pg_class 00004000000030008000000000004008"
        - "test_db.pg_type [ysql_schema=pg_catalog] 00004000000030008000000000004009"
        - "test_db.columns [ysql_schema=information_schema] 00004000000030008000000000004010"
        - "other_db.table3 [ysql_schema=public] 00004000000030008000000000004003"
  tasks:
    - name: Parse table IDs
      set_fact:
        xcluster_table_ids: >-
          {%- set ids = [] -%}
          {%- for db in xcluster_databases -%}
            {%- for line in yb_tables_raw.stdout_lines -%}
              {%- if line.startswith(db.name ~ '.') -%}
                {%- set table_name = (line.split(' ') | first).split('.', 1) | last -%}
                {%- set table_allowed = db.tables is not defined or table_name in db.tables -%}
                {%- set system_schema = db.type == 'ysql' and ('[ysql_schema=pg_catalog]' in line or '[ysql_schema=information_schema]' in line) -%}
                {%- if table_allowed and not system_schema -%}
                  {%- set table_id = line.split(' ') | last -%}
                  {%- set _ = ids.append(table_id) -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
          {%- endfor -%}
          {{ ids | join(',') }}

    - name: Debug parsed IDs
      debug:
        var: xcluster_table_ids

    - name: Assert parsed IDs (Correct)
      assert:
        that:
          - xcluster_table_ids == "00004000000030008000000000004001,00004000000030008000000000004002"
