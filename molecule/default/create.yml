---
- name: Create molecule instances
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vm_prefix: yb-ansible
    vm_dir: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/.vms"
    base_img: "{{ vm_dir }}/AlmaLinux-9-GenericCloud-latest.x86_64.qcow2"
    base_img_url: https://repo.almalinux.org/almalinux/9/cloud/x86_64/images/AlmaLinux-9-GenericCloud-latest.x86_64.qcow2
    ssh_pub_key: "{{ lookup('env', 'MOLECULE_SSH_PUB_KEY') | default('ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINtJBZHaT6eSByrSE/min8SywDzig9Kou1Q5TwCPpsCD rophy', true) }}"
    ssh_identity_file: "{{ lookup('env', 'MOLECULE_SSH_IDENTITY_FILE') | default(lookup('env', 'HOME') ~ '/.ssh/id_ed25519', true) }}"
  tasks:
    - name: Create VM directory
      ansible.builtin.file:
        path: "{{ vm_dir }}"
        state: directory
        mode: "0755"

    - name: Check if get-cloud-image is available
      ansible.builtin.command:
        cmd: which get-cloud-image
      register: _get_cloud_image
      changed_when: false
      failed_when: false

    - name: Fetch base image via shared cache
      ansible.builtin.command:
        cmd: "get-cloud-image {{ base_img_url }}"
      register: _cached_img
      when: _get_cloud_image.rc == 0

    - name: Symlink cached image into VM directory
      ansible.builtin.file:
        src: "{{ _cached_img.stdout | trim }}"
        dest: "{{ base_img }}"
        state: link
        force: true
      when: _get_cloud_image.rc == 0

    - name: Check base image exists
      ansible.builtin.stat:
        path: "{{ base_img }}"
      register: _base_img
      when: _get_cloud_image.rc != 0

    - name: Download base image if missing
      ansible.builtin.get_url:
        url: "{{ base_img_url }}"
        dest: "{{ base_img }}"
        mode: "0644"
      when: _get_cloud_image.rc != 0 and not _base_img.stat.exists

    - name: Create VMs
      ansible.builtin.include_tasks: tasks/create_vm.yml
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        loop_var: platform

    - name: Wait for VMs to get IPs
      ansible.builtin.pause:
        seconds: 30

    - name: Discover VM IPs
      ansible.builtin.command:
        cmd: "virsh domifaddr {{ vm_prefix }}-{{ item.name }}"
      register: _vm_ips
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false
      failed_when: false
      retries: 15
      delay: 10
      until:
        - _vm_ips.rc == 0
        - _vm_ips.stdout | regex_search('(\d+\.){3}\d+') is not none

    - name: Fail if any VM has no IP
      ansible.builtin.fail:
        msg: "VM {{ item.item.name }} did not get an IP address"
      when: item.stdout | regex_search('(\d+\.){3}\d+') is none
      loop: "{{ _vm_ips.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Build instance config
      ansible.builtin.set_fact:
        instance_conf: >-
          {{ instance_conf | default([]) + [{
            'instance': item.item.name,
            'address': item.stdout | regex_search('(\d+\.){3}\d+'),
            'user': 'almalinux',
            'port': '22',
            'identity_file': ssh_identity_file
          }] }}
      loop: "{{ _vm_ips.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Write instance config
      ansible.builtin.copy:
        content: "{{ instance_conf | to_nice_yaml }}"
        dest: "{{ molecule_instance_config }}"
        mode: "0644"

    - name: Wait for SSH on all instances
      ansible.builtin.wait_for:
        host: "{{ item.address }}"
        port: 22
        timeout: 120
      loop: "{{ instance_conf }}"
      loop_control:
        label: "{{ item.instance }}"

    - name: Wait for cloud-init to finish (new VMs only)
      ansible.builtin.command:
        cmd: >-
          ssh -o StrictHostKeyChecking=no
          -o UserKnownHostsFile=/dev/null
          -i {{ ssh_identity_file }}
          almalinux@{{ item.address }}
          cloud-init status --wait
      loop: "{{ instance_conf | selectattr('instance', 'in', _vms_needing_snapshot | default([])) | list }}"
      loop_control:
        label: "{{ item.instance }}"
      changed_when: false
      retries: 10
      delay: 10
      until: _cloud_init.rc == 0
      register: _cloud_init

    - name: Take snapshots of newly created VMs
      when: (_vms_needing_snapshot | default([])) | length > 0
      block:
        - name: Shut down new VMs for snapshot
          ansible.builtin.command:
            cmd: "virsh shutdown {{ vm_prefix }}-{{ item }}"
          loop: "{{ _vms_needing_snapshot }}"

        - name: Wait for VMs to shut off
          ansible.builtin.command:
            cmd: "virsh domstate {{ vm_prefix }}-{{ item }}"
          register: _shutdown_state
          until: "'shut off' in _shutdown_state.stdout"
          retries: 30
          delay: 2
          changed_when: false
          loop: "{{ _vms_needing_snapshot }}"

        - name: Take clean-base snapshots
          ansible.builtin.command:
            cmd: >-
              virsh snapshot-create-as {{ vm_prefix }}-{{ item }}
              clean-base --description "Clean OS for molecule tests"
          loop: "{{ _vms_needing_snapshot }}"

        - name: Start VMs after snapshot
          ansible.builtin.command:
            cmd: "virsh start {{ vm_prefix }}-{{ item }}"
          loop: "{{ _vms_needing_snapshot }}"

        - name: Wait for SSH after snapshot restart
          ansible.builtin.wait_for:
            host: "{{ item.address }}"
            port: 22
            timeout: 120
          loop: "{{ instance_conf | selectattr('instance', 'in', _vms_needing_snapshot) | list }}"
          loop_control:
            label: "{{ item.instance }}"

    - name: Collect SSH host keys
      ansible.builtin.shell:
        cmd: >-
          ssh-keyscan -H {{ item.address }}
        executable: /bin/bash
      register: _host_keys
      loop: "{{ instance_conf }}"
      loop_control:
        label: "{{ item.instance }}"
      changed_when: false

    - name: Write known_hosts
      ansible.builtin.copy:
        content: "{{ _host_keys.results | map(attribute='stdout') | join('\n') }}\n"
        dest: "{{ vm_dir }}/known_hosts"
        mode: "0644"

    - name: Find molecule inventory directory
      ansible.builtin.set_fact:
        _molecule_inv_dir: "{{ molecule_instance_config | dirname }}/inventory"

    - name: Create host_vars directory
      ansible.builtin.file:
        path: "{{ _molecule_inv_dir }}/host_vars"
        state: directory
        mode: "0755"

    - name: Write ansible_host for each instance
      ansible.builtin.copy:
        content: "ansible_host: {{ item.address }}\n"
        dest: "{{ _molecule_inv_dir }}/host_vars/{{ item.instance }}"
        mode: "0644"
      loop: "{{ instance_conf }}"
      loop_control:
        label: "{{ item.instance }}"

    - name: Build platform lookup
      ansible.builtin.set_fact:
        _platform_by_name: "{{ molecule_yml.platforms | items2dict(key_name='name', value_name='groups') }}"

    - name: Write .vms/inventory for manual use
      ansible.builtin.copy:
        content: |
          [all:vars]
          ansible_user=almalinux
          ansible_ssh_common_args=-o UserKnownHostsFile={{ vm_dir }}/known_hosts

          {% for group in _platform_by_name.values() | flatten | unique | sort %}
          [{{ group }}]
          {% for inst in instance_conf if group in _platform_by_name[inst.instance] %}
          {{ inst.instance }} ansible_host={{ inst.address }}
          {% endfor %}

          {% endfor %}
        dest: "{{ vm_dir }}/inventory"
        mode: "0644"
