---
- name: Rolling restart YB masters
  hosts: masters
  become: true
  serial: 1
  tags: [masters]
  tasks:
    - name: Stop yb-master
      ansible.builtin.systemd:
        name: "{{ yb_master_service_name }}"
        state: stopped

    - name: Start yb-master
      ansible.builtin.systemd:
        name: "{{ yb_master_service_name }}"
        state: started
        daemon_reload: true

    - name: Verify yb-master
      ansible.builtin.include_role:
        name: yb-master
        tasks_from: verify.yml

    - name: Pause before next master
      ansible.builtin.pause:
        seconds: 60
        prompt: "Waiting 60s for cluster to stabilize before next master"
      when: ansible_play_hosts_all.index(inventory_hostname) < (ansible_play_hosts_all | length - 1)

- name: Rolling restart YB tservers
  hosts: tservers
  become: true
  serial: 1
  tags: [tservers]
  tasks:
    - name: Stop yb-tserver
      ansible.builtin.systemd:
        name: "{{ yb_tserver_service_name }}"
        state: stopped

    - name: Start yb-tserver
      ansible.builtin.systemd:
        name: "{{ yb_tserver_service_name }}"
        state: started
        daemon_reload: true

    - name: Verify yb-tserver
      ansible.builtin.include_role:
        name: yb-tserver
        tasks_from: verify.yml

    - name: Pause before next tserver
      ansible.builtin.pause:
        seconds: 60
        prompt: "Waiting 60s for tablet load to rebalance before next tserver"
      when: ansible_play_hosts_all.index(inventory_hostname) < (ansible_play_hosts_all | length - 1)
