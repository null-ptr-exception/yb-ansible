---
driver:
  name: default
  options:
    managed: false

platforms:
  - name: ${YB_MASTER_1_IP}
    groups:
      - masters
  - name: ${YB_MASTER_2_IP}
    groups:
      - masters
  - name: ${YB_MASTER_3_IP}
    groups:
      - masters
  - name: ${YB_TSERVER_1_IP}
    groups:
      - tservers

provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        ansible_user: ubuntu
  config_options:
    defaults:
      roles_path: ${MOLECULE_PROJECT_DIRECTORY}/roles
  env:
    ANSIBLE_HOST_KEY_CHECKING: "false"

verifier:
  name: ansible
