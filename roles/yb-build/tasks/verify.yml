---
- name: Verify YB binary exists
  ansible.builtin.stat:
    path: "{{ yb_install_dir }}/bin/yb-master"
  register: _yb_verify_binary

- name: Assert YB binary is present
  ansible.builtin.assert:
    that: _yb_verify_binary.stat.exists
    fail_msg: "YugabyteDB binary not found at {{ yb_install_dir }}/bin/yb-master"

- name: Get installed YB version
  ansible.builtin.command:
    cmd: "{{ yb_install_dir }}/bin/yb-master --version"
  register: _yb_verify_version
  changed_when: false

- name: Parse installed YB version strings
  ansible.builtin.set_fact:
    _yb_verify_installed_version: "{{ (_yb_verify_version.stdout | default('') | regex_search('version\\s+(\\S+)', '\\1') | default([''], true) | first) }}"
    _yb_verify_installed_build: "{{ (_yb_verify_version.stdout | default('') | regex_search('build\\s+(\\S+)', '\\1') | default([''], true) | first) }}"

- name: Assert YB version matches
  ansible.builtin.assert:
    that:
      - "_yb_verify_installed_version == yb_shipper_version"
      - "_yb_verify_installed_build == (yb_shipper_build_number | string)"
    fail_msg: "Version mismatch: expected {{ yb_shipper_tag }}, got {{ _yb_verify_version.stdout }}"
