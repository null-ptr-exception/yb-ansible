---
- name: Create node-exporter install directory
  ansible.builtin.file:
    path: "{{ node_exporter_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Check if node-exporter is already installed
  ansible.builtin.stat:
    path: "{{ node_exporter_install_dir }}/node_exporter"
  register: ne_installed

- name: Check if node-exporter image exists
  ansible.builtin.command:
    cmd: podman image exists {{ node_exporter_image }}
  register: ne_image_exists
  changed_when: false
  failed_when: false
  when: not ne_installed.stat.exists

- name: Pull node-exporter image
  ansible.builtin.command:
    cmd: podman pull {{ node_exporter_image }}
  register: podman_pull
  changed_when: "'Already exists' not in podman_pull.stdout"
  when: not ne_installed.stat.exists and ne_image_exists.rc != 0

- name: Create temporary container from node-exporter image
  ansible.builtin.command:
    cmd: podman create --name ne-tmp {{ node_exporter_image }}
  changed_when: true
  when: not ne_installed.stat.exists

- name: Copy node_exporter binary from container
  ansible.builtin.command:
    cmd: podman cp ne-tmp:/bin/node_exporter {{ node_exporter_install_dir }}/node_exporter
  changed_when: true
  when: not ne_installed.stat.exists

- name: Remove temporary container
  ansible.builtin.command:
    cmd: podman rm ne-tmp
  changed_when: true
  when: not ne_installed.stat.exists

- name: Set node_exporter binary permissions
  ansible.builtin.file:
    path: "{{ node_exporter_install_dir }}/node_exporter"
    owner: root
    group: root
    mode: "0755"

- name: Install node-exporter systemd unit
  ansible.builtin.template:
    src: node-exporter.service.j2
    dest: /etc/systemd/system/node-exporter.service
    mode: "0644"
  notify: restart node-exporter

- name: Enable and start node-exporter
  ansible.builtin.systemd:
    name: node-exporter
    state: started
    enabled: true
    daemon_reload: true

- name: Verify node-exporter role
  ansible.builtin.import_tasks: verify.yml
