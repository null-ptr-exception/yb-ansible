name: CI Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, nuc-rophy]
    env:
      LIBVIRT_DEFAULT_URI: qemu:///system

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install crane
        run: |
          if ! command -v crane &>/dev/null; then
            CRANE_VERSION=0.20.3
            CRANE_SHA256=36c67a932f489b3f2724b64af90b599a8ef2aa7b004872597373c0ad694dc059
            curl -fsSL -o /tmp/crane.tar.gz \
              "https://github.com/google/go-containerregistry/releases/download/v${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz"
            echo "${CRANE_SHA256}  /tmp/crane.tar.gz" | sha256sum -c -
            sudo tar -xzf /tmp/crane.tar.gz -C /usr/local/bin crane
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible molecule

      - name: Read runner SSH public key
        id: ssh-key
        run: |
          echo "pub_key=$(cat ~/.ssh/id_ed25519.pub)" >> "$GITHUB_OUTPUT"
          echo "identity_file=$HOME/.ssh/id_ed25519" >> "$GITHUB_OUTPUT"

      - name: Clean up stale VMs
        run: |
          for vm in $(virsh list --all --name 2>/dev/null | grep '^yb-ansible-'); do
            virsh destroy "$vm" 2>/dev/null || true
            virsh undefine "$vm" --snapshots-metadata --remove-all-storage 2>/dev/null \
              || virsh undefine "$vm" --snapshots-metadata 2>/dev/null || true
          done

      - name: Run molecule test
        run: molecule test
        env:
          MOLECULE_SSH_PUB_KEY: ${{ steps.ssh-key.outputs.pub_key }}
          MOLECULE_SSH_IDENTITY_FILE: ${{ steps.ssh-key.outputs.identity_file }}
          MOLECULE_YB_SHIPPER_REGISTRY: ${{ secrets.MOLECULE_YB_SHIPPER_REGISTRY }}
          MOLECULE_NODE_EXPORTER_REGISTRY: ${{ secrets.MOLECULE_NODE_EXPORTER_REGISTRY }}
          MOLECULE_CRANE_INSECURE: "true"
