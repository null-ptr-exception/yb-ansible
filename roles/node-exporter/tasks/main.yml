---
- name: Create node-exporter install directory
  ansible.builtin.file:
    path: "{{ node_exporter_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Check if node-exporter is already installed
  ansible.builtin.stat:
    path: "{{ node_exporter_install_dir }}/node_exporter"
  register: ne_installed

- name: Extract node_exporter binary from image on controller
  delegate_to: localhost
  run_once: true
  become: false
  when: not ne_installed.stat.exists
  block:
    - name: Create controller cache directory
      ansible.builtin.file:
        path: "{{ node_exporter_package_cache_dir }}"
        state: directory
        mode: "0755"

    - name: Check if cached binary already exists
      ansible.builtin.stat:
        path: "{{ node_exporter_package_cache_dir }}/node_exporter"
      register: _ne_cached_binary

    - name: Pull image and extract binary
      when: not _ne_cached_binary.stat.exists
      block:
        - name: Pull node-exporter image on controller
          ansible.builtin.command:
            cmd: podman pull {% if not (podman_tls_verify | default(true) | bool) %}--tls-verify=false {% endif %}{{ node_exporter_image }}
          changed_when: true

        - name: Create temporary container from node-exporter image
          ansible.builtin.command:
            cmd: podman create --name ne-tmp {{ node_exporter_image }}
          changed_when: true

        - name: Copy node_exporter binary from container
          ansible.builtin.command:
            cmd: podman cp ne-tmp:/bin/node_exporter {{ node_exporter_package_cache_dir }}/node_exporter
          changed_when: true

        - name: Remove temporary container
          ansible.builtin.command:
            cmd: podman rm ne-tmp
          changed_when: true

- name: Create node package directory
  ansible.builtin.file:
    path: "{{ node_exporter_package_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: not ne_installed.stat.exists

- name: Ship node_exporter binary to package directory
  ansible.builtin.copy:
    src: "{{ node_exporter_package_cache_dir }}/node_exporter"
    dest: "{{ node_exporter_package_dir }}/node_exporter"
    owner: root
    group: root
    mode: "0755"
  when: not ne_installed.stat.exists

- name: Symlink node_exporter binary to install directory
  ansible.builtin.file:
    src: "{{ node_exporter_package_dir }}/node_exporter"
    dest: "{{ node_exporter_install_dir }}/node_exporter"
    state: link
  when: not ne_installed.stat.exists

- name: Install node-exporter systemd unit
  ansible.builtin.template:
    src: node-exporter.service.j2
    dest: /etc/systemd/system/node-exporter.service
    mode: "0644"
  notify: restart node-exporter

- name: Enable and start node-exporter
  ansible.builtin.systemd:
    name: node-exporter
    state: started
    enabled: true
    daemon_reload: true

- name: Verify node-exporter role
  ansible.builtin.import_tasks: verify.yml
