---
- name: Install podman and node-exporter
  ansible.builtin.apt:
    name:
      - podman
      - prometheus-node-exporter
    state: present
    update_cache: true

- name: Create yugabyte group
  ansible.builtin.group:
    name: "{{ yb_group }}"
    system: true

- name: Create yugabyte user
  ansible.builtin.user:
    name: "{{ yb_user }}"
    group: "{{ yb_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ yb_install_dir }}"
    create_home: false

- name: Create install directory
  ansible.builtin.file:
    path: "{{ yb_install_dir }}"
    state: directory
    owner: "{{ yb_user }}"
    group: "{{ yb_group }}"
    mode: "0755"

- name: Configure node-exporter port
  ansible.builtin.lineinfile:
    path: /etc/default/prometheus-node-exporter
    regexp: '^ARGS='
    line: 'ARGS="--web.listen-address=:{{ node_exporter_port }}"'
  notify: restart node-exporter

- name: Enable and start node-exporter
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    state: started
    enabled: true

- name: Verify common role
  ansible.builtin.import_tasks: verify.yml
