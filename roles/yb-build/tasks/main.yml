---
- name: Check if YB binary exists
  ansible.builtin.stat:
    path: "{{ yb_install_dir }}/bin/yb-master"
  register: _yb_exists

- name: Get installed YB version
  ansible.builtin.command:
    cmd: "{{ yb_install_dir }}/bin/yb-master --version"
  register: _yb_version_output
  changed_when: false
  when: _yb_exists.stat.exists

- name: Parse installed YB version strings
  ansible.builtin.set_fact:
    _yb_installed_version: "{{ (_yb_version_output.stdout | default('') | regex_search('version\\s+(\\S+)', '\\1') | default([''], true) | first) }}"
    _yb_installed_build: "{{ (_yb_version_output.stdout | default('') | regex_search('build\\s+(\\S+)', '\\1') | default([''], true) | first) }}"

- name: Determine if install is needed
  ansible.builtin.set_fact:
    _yb_needs_install: >-
      {{ not _yb_exists.stat.exists
         or _yb_installed_version != yb_shipper_version
         or _yb_installed_build != (yb_shipper_build_number | string) }}

- name: Set post_install marker path
  ansible.builtin.set_fact:
    _yb_post_install_marker: "{{ yb_install_dir }}/.post_install_done_{{ yb_shipper_tag }}"

- name: Check if yb-master is running
  ansible.builtin.command:
    cmd: systemctl is-active yb-master
  register: _yb_master_active
  changed_when: false
  failed_when: false
  when:
    - _yb_needs_install | bool
    - _yb_exists.stat.exists

- name: Fail on version change with running services
  ansible.builtin.fail:
    msg: >-
      Version change detected (current: {{ _yb_version_output.stdout | default('none') }},
      target: {{ yb_shipper_tag }}). Use upgrade.yml for version changes.
  when:
    - _yb_needs_install | bool
    - _yb_exists.stat.exists
    - _yb_master_active.rc | default(1) == 0
    - not (yb_allow_version_change | default(false))

- name: Extract tarball from shipper image on controller
  delegate_to: localhost
  run_once: true
  become: false
  block:
    - name: Create controller cache directory
      ansible.builtin.file:
        path: "{{ yb_package_cache_dir }}"
        state: directory
        mode: "0755"

    - name: Check if cached tarball already exists
      ansible.builtin.stat:
        path: "{{ yb_package_cache_dir }}/yugabyte.tar.gz"
      register: _yb_cached_tarball

    - name: Extract tarball from shipper image
      ansible.builtin.shell:
        cmd: >-
          crane export
          {% if crane_insecure | default(false) | bool %}--insecure {% endif %}
          {{ yb_shipper_image }} - |
          tar -xf - -C {{ yb_package_cache_dir }} --strip-components=1 tarball/yugabyte.tar.gz
      changed_when: true
      when: not _yb_cached_tarball.stat.exists

- name: Create node package directory
  ansible.builtin.file:
    path: "{{ yb_package_dir }}"
    state: directory
    owner: "{{ yb_user }}"
    group: "{{ yb_group }}"
    mode: "0755"
  when: _yb_needs_install | bool

- name: Ship tarball to nodes
  ansible.builtin.copy:
    src: "{{ yb_package_cache_dir }}/yugabyte.tar.gz"
    dest: "{{ yb_package_dir }}/yugabyte.tar.gz"
    owner: "{{ yb_user }}"
    group: "{{ yb_group }}"
    mode: "0644"
  when: _yb_needs_install | bool

- name: Extract YugabyteDB tarball
  ansible.builtin.unarchive:
    src: "{{ yb_package_dir }}/yugabyte.tar.gz"
    dest: "{{ yb_install_dir }}"
    remote_src: true
    owner: "{{ yb_user }}"
    group: "{{ yb_group }}"
    extra_opts:
      - --strip-components=1
  when: _yb_needs_install | bool

- name: Check if post_install.sh has been run for this version
  ansible.builtin.stat:
    path: "{{ _yb_post_install_marker }}"
  register: post_install_done

- name: Run post_install.sh
  ansible.builtin.command:
    cmd: ./bin/post_install.sh
    chdir: "{{ yb_install_dir }}"
  when:
    - _yb_needs_install | bool or not post_install_done.stat.exists

- name: Mark post_install.sh as completed for this version
  ansible.builtin.file:
    path: "{{ _yb_post_install_marker }}"
    state: touch
    owner: "{{ yb_user }}"
    group: "{{ yb_group }}"
    mode: "0644"
  when:
    - _yb_needs_install | bool or not post_install_done.stat.exists

- name: Verify yb-build role
  ansible.builtin.import_tasks: verify.yml
