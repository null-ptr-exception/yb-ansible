---
- name: Ensure local cache directory exists
  ansible.builtin.file:
    path: "{{ yb_portable_python_archive | dirname }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false

- name: Download portable Python to controller
  ansible.builtin.get_url:
    url: "{{ yb_portable_python_url }}"
    dest: "{{ yb_portable_python_archive }}"
    checksum: "{{ yb_portable_python_checksum }}"
    mode: "0644"
  delegate_to: localhost
  become: false

- name: Ensure destination directory exists on remote
  ansible.builtin.file:
    path: "/opt/ansible"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Extract portable Python on remote
  ansible.builtin.unarchive:
    src: "{{ yb_portable_python_archive }}"
    dest: "/opt/ansible"
    owner: root
    group: root
    remote_src: false

- name: Rename extracted directory to python3
  ansible.builtin.shell: |
    if [ -d "/opt/ansible/python" ]; then
      mv /opt/ansible/python /opt/ansible/python3
    fi
  args:
    creates: "/opt/ansible/python3"
