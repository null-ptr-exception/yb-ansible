---
- name: Verify s5cmd binary exists on controller
  ansible.builtin.stat:
    path: "{{ s5cmd_controller_bin }}"
  register: _s5cmd_binary
  delegate_to: localhost
  run_once: true

- name: Assert s5cmd binary is present and executable on controller
  ansible.builtin.assert:
    that:
      - _s5cmd_binary.stat.exists
      - _s5cmd_binary.stat.executable | default(false)
    fail_msg: "s5cmd binary is missing or not executable at {{ s5cmd_controller_bin }}"
  delegate_to: localhost
  run_once: true

- name: Verify s5cmd binary exists on nodes
  ansible.builtin.stat:
    path: "/usr/local/bin/s5cmd"
  register: _s5cmd_node_binary

- name: Assert s5cmd binary is present and executable on nodes
  ansible.builtin.assert:
    that:
      - _s5cmd_node_binary.stat.exists
      - _s5cmd_node_binary.stat.mode == '0755'
    fail_msg: "s5cmd binary is missing or has incorrect permissions at /usr/local/bin/s5cmd"
