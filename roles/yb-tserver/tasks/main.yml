---
- name: Derive master_addresses from inventory
  ansible.builtin.set_fact:
    yb_master_addresses: >-
      {{ groups['masters']
         | map('regex_replace', '$', ':' ~ yb_master_rpc_port)
         | join(',') }}
  when: yb_master_addresses is not defined

- name: Create tserver data directory
  ansible.builtin.file:
    path: "{{ yb_data_dir }}/tserver"
    state: directory
    owner: "{{ yb_user }}"
    group: "{{ yb_group }}"
    mode: "0755"

- name: Install yb-tserver systemd unit
  ansible.builtin.template:
    src: yb-tserver.service.j2
    dest: /etc/systemd/system/yb-tserver.service
    mode: "0644"
  notify: restart yb-tserver

- name: Enable and start yb-tserver
  ansible.builtin.systemd:
    name: yb-tserver
    state: started
    enabled: true
    daemon_reload: true
